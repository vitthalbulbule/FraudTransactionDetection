<!DOCTYPE html>
<html>

<head>

<title>AI Fraud Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-header bg-primary text-white">

<h2>AI Fraud Detection Dashboard</h2>

</div>

<div class="card-body">

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Transaction Type</label>

<select class="form-control" name="type">

<option>PAYMENT</option>
<option>TRANSFER</option>
<option>CASH_OUT</option>
<option>CASH_IN</option>
<option>DEBIT</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Amount</label>

<input type="number"
step="0.01"
name="amount"
class="form-control"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Old Sender Balance</label>

<input type="number"
step="0.01"
name="oldbalanceOrg"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>New Sender Balance</label>

<input type="number"
step="0.01"
name="newbalanceOrig"
class="form-control"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Old Receiver Balance</label>

<input type="number"
step="0.01"
name="oldbalanceDest"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>New Receiver Balance</label>

<input type="number"
step="0.01"
name="newbalanceDest"
class="form-control"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Origin Type</label>

<select class="form-control" name="orig_type">

<option>C</option>
<option>M</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Destination Type</label>

<select class="form-control" name="dest_type">

<option>C</option>
<option>M</option>

</select>

</div>

</div>

<div class="text-center">

<button class="btn btn-success btn-lg">

Analyze Transaction

</button>

</div>

</form>

{% if prediction %}

<div class="alert alert-info mt-4">

<h3>{{ prediction }}</h3>

<h4>Fraud Probability: {{ probability }}%</h4>

</div>

{% endif %}

</div>

</div>

</div>

</body>
</html>
